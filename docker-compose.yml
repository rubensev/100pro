version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hundredpro
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASS: postgres
      DATABASE_NAME: hundredpro
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    ports:
      - '3000:3000'

  frontend:
    build: ./frontend
    ports:
      - '4200:80'
    depends_on:
      - backend

volumes:
  pgdata:
