  ::-webkit-scrollbar { width: 5px; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .fade-in { animation: fadeIn 0.35s ease both; }
  .pop-in { animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 80px; right: 16px; z-index: 1000;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; width: 260px;
    box-shadow: var(--shadow-md);
    animation: popIn 0.25s ease both;

  .tweaks-panel h4 { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 13px; color: var(--text); }
  .tweak-toggle { width: 38px; height: 22px; border-radius: 99px; background: var(--border); position: relative; cursor: pointer; transition: var(--transition); }
  .tweak-toggle.on { background: var(--primary); }
  .tweak-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: var(--transition); box-shadow: 0 1px 4px #0002; }
  .tweak-toggle.on::after { left: 19px; }
  .tweak-select { font-size: 12px; padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }

}

      border: '2px solid white',

}

function ActionBtn({ icon, label, active, onClick }) {

// Calendar Widget
function CalendarWidget() {
  const today = 21;
  const days = Array.from({ length: 30 }, (_, i) => i + 1);
  const eventDays = CALENDAR_EVENTS.map(e => e.day);
  const [selected, setSelected] = useState(today);
  const selectedEvent = CALENDAR_EVENTS.find(e => e.day === selected);

  return (
    <div style={{ background: 'var(--card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)', padding: 16, boxShadow: 'var(--shadow)' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <div style={{ fontWeight: 700, fontSize: 14 }}>Abril 2026</div>
        <div style={{ display: 'flex', gap: 4 }}>
          <CalNavBtn>‹</CalNavBtn>
          <CalNavBtn>›</CalNavBtn>
        </div>
      </div>
      {/* Day labels */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 4 }}>
        {['D','S','T','Q','Q','S','S'].map((d, i) => (
          <div key={i} style={{ textAlign: 'center', fontSize: 10, fontWeight: 600, color: 'var(--text3)', padding: '2px 0' }}>{d}</div>
        ))}
      </div>
      {/* Days grid — April 2026 starts on Wednesday (offset=3) */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
        {Array.from({ length: 3 }).map((_, i) => <div key={`e${i}`} />)}
        {days.map(d => {
          const hasEvent = eventDays.includes(d);
          const isToday = d === today;
          const isSel = d === selected;
          const ev = CALENDAR_EVENTS.find(e => e.day === d);
          return (
            <button key={d} onClick={() => setSelected(d)} style={{
              aspectRatio: '1', borderRadius: 8, border: 'none',
              background: isSel ? 'var(--primary)' : isToday ? 'var(--primary-xlight)' : 'transparent',
              color: isSel ? 'white' : isToday ? 'var(--primary)' : 'var(--text)',
              fontSize: 12, fontWeight: isSel || isToday ? 700 : 400,
              cursor: 'pointer', transition: 'var(--transition)',
              position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}
            onMouseEnter={e => { if (!isSel) e.currentTarget.style.background = 'var(--bg2)'; }}
            onMouseLeave={e => { if (!isSel) e.currentTarget.style.background = isToday ? 'var(--primary-xlight)' : 'transparent'; }}>
              {d}
              {hasEvent && !isSel && (
                <div style={{
                  position: 'absolute', bottom: 2, left: '50%', transform: 'translateX(-50%)',
                  width: 4, height: 4, borderRadius: '50%', background: ev?.color
                }} />
              )}
            </button>
          );
        })}
      </div>

      {selectedEvent && (
        <div className="fade-in" style={{
          marginTop: 12, padding: '10px 12px',
          background: 'var(--bg)', borderRadius: 10,
          borderLeft: `3px solid ${selectedEvent.color}`
        }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text)' }}>{selectedEvent.service}</div>
          <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2 }}>{selectedEvent.provider} · {selectedEvent.time}</div>
        </div>
      )}
      {!selectedEvent && selected && (
        <div style={{ marginTop: 10, fontSize: 12, color: 'var(--text3)', textAlign: 'center', padding: '8px 0' }}>Sem agendamentos neste dia</div>
      )}
    </div>
  );
}

function CalNavBtn({ children }) {

function FeedScreen({ providers, posts, setPosts, onProfile }) {
  const [query, setQuery] = useState('');
  const [activeCategory, setActiveCategory] = useState('all');

  const filtered = posts.filter(p =>
    (activeCategory === 'all' || p.category === activeCategory) &&
    (query === '' || p.text.toLowerCase().includes(query.toLowerCase()) || p.provider.name.toLowerCase().includes(query.toLowerCase()))
  );

  function toggleLike(id) {
    setPosts(ps => ps.map(p => p.id === id ? { ...p, liked: !p.liked } : p));
  }
  function toggleSave(id) {
    setPosts(ps => ps.map(p => p.id === id ? { ...p, saved: !p.saved } : p));
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <SearchBar query={query} setQuery={setQuery} activeCategory={activeCategory} setActiveCategory={setActiveCategory} />
      {filtered.length === 0 && (

          <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
          <div style={{ fontSize: 14 }}>Nenhum resultado para essa busca</div>
        </div>
      )}
      {filtered.map((post, i) => (
        <div key={post.id} style={{ animationDelay: `${i * 0.06}s` }}>
          <FeedPost post={post} onToggleLike={toggleLike} onToggleSave={toggleSave} onProfile={onProfile} />
        </div>
      ))}
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('100pro_tweaks') || 'null') || TWEAK_DEFAULTS; } catch { return TWEAK_DEFAULTS; }
  });
  const [showTweaks, setShowTweaks] = useState(false);
  const [activeTab, setActiveTab] = useState(() => localStorage.getItem('100pro_tab') || 'feed');
  const [providers, setProviders] = useState(PROVIDERS);
  const [posts, setPosts] = useState(FEED_POSTS);
  const [selectedProvider, setSelectedProvider] = useState(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  // Dark mode via tweaks
  useEffect(() => {
    const r = document.documentElement;
    if (tweaks.darkMode) {
      r.style.setProperty('--bg', 'oklch(0.12 0.015 250)');
      r.style.setProperty('--bg2', 'oklch(0.16 0.015 250)');
      r.style.setProperty('--card', 'oklch(0.17 0.015 250)');
      r.style.setProperty('--border', 'oklch(0.24 0.015 250)');
      r.style.setProperty('--text', 'oklch(0.92 0.01 250)');
      r.style.setProperty('--text2', 'oklch(0.68 0.015 250)');
      r.style.setProperty('--text3', 'oklch(0.50 0.010 250)');
    } else {
      r.style.removeProperty('--bg'); r.style.removeProperty('--bg2'); r.style.removeProperty('--card');
      r.style.removeProperty('--border'); r.style.removeProperty('--text'); r.style.removeProperty('--text2'); r.style.removeProperty('--text3');
    }
    localStorage.setItem('100pro_tweaks', JSON.stringify(tweaks));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  }, [tweaks]);

  useEffect(() => {
    localStorage.setItem('100pro_tab', activeTab);
  }, [activeTab]);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Tweaks toggle
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function toggleFav(id) { setProviders(ps => ps.map(p => p.id === id ? { ...p, fav: !p.fav } : p)); }

  const showRight = !isMobile && (activeTab === 'feed' || activeTab === 'explore');

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: 'var(--bg)' }}>
      {!isMobile && <SidebarNav activeTab={activeTab} setActiveTab={setActiveTab} isMobile={false} />}

      {/* Main */}

        {/* Mobile header */}
        {isMobile && (
          <div style={{
            position: 'sticky', top: 0, zIndex: 40,

            backdropFilter: 'blur(12px)'

            </div>
          </div>

        <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>

          <div className="tweak-row">
            <span>Esquema de cores</span>
            <select className="tweak-select" value={tweaks.colorScheme} onChange={e => setTweaks(t => ({...t, colorScheme: e.target.value}))}>
              <option value="indigo">Índigo</option>
              <option value="violet">Violeta</option>
              <option value="teal">Teal</option>
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
